name: Backend CI

on:
  push:
    paths:
      - 'src/backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    paths:
      - 'src/backend/**'
      - '.github/workflows/backend.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build backend
        working-directory: src/backend
        run: dotnet build

      - name: Run architecture tests
        working-directory: src/backend
        run: dotnet test Grimoire.ArchTests --logger "console;verbosity=normal"
