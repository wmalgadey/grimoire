name: Backend CI

on:
  pull_request:
    paths:
      - 'src/backend/**'
      - '.github/workflows/backend.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build backend
        working-directory: src/backend
        run: dotnet build

      - name: Run architecture tests (Grimoire.ArchTests)
        working-directory: src/backend
        run: dotnet test Grimoire.ArchTests --logger "console;verbosity=normal"

      - name: Run API architecture tests (DomainIsolationTests)
        working-directory: src/backend
        run: dotnet test Grimoire.Api.Tests/Grimoire.Api.Tests.csproj --filter "DomainIsolationTests" --logger "console;verbosity=normal"

      - name: Run integration tests
        working-directory: src/backend
        run: dotnet test Grimoire.Api.Tests/Grimoire.Api.Tests.csproj --filter "Integration" --logger "console;verbosity=normal"
