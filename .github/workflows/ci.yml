name: CI

on:
  pull_request:

env:
  DOTNET_NOLOGO: true
  ANTHROPIC_AUTH_TOKEN: ""

jobs:
  backend:
    name: Deterministic Backend Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install markitdown (003-ingest-intake-webui conversion adapter)
        run: pip install --break-system-packages markitdown

      - name: Restore solution
        run: dotnet restore backend/Grimoire.slnx

      - name: Build solution
        run: dotnet build backend/Grimoire.slnx --configuration Release --no-restore

      - name: Run linting and formatting checks
        run: dotnet format backend/Grimoire.slnx --verify-no-changes --no-restore --verbosity minimal

      - name: Run architecture tests
        run: dotnet test backend/tests/Grimoire.ArchTests --configuration Release --no-build

      - name: Run domain unit tests
        run: dotnet test backend/tests/Grimoire.Domain.UnitTests --configuration Release --no-build

      - name: Run hermetic integration tests
        run: dotnet test backend/tests/Grimoire.IntegrationTests --configuration Release --no-build

  frontend:
    name: Frontend Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Type-check
        working-directory: frontend
        run: npm run check

      - name: Lint and format check
        working-directory: frontend
        run: npm run lint

      - name: Run tests
        working-directory: frontend
        run: npm run test

      - name: Build
        working-directory: frontend
        run: npm run build