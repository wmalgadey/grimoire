name: CI

on:
  pull_request:

env:
  DOTNET_NOLOGO: true
  ANTHROPIC_AUTH_TOKEN: ""

jobs:
  backend:
    name: Deterministic Backend Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install markitdown (003-ingest-intake-webui conversion adapter)
        run: pip install --break-system-packages markitdown

      - name: Restore solution
        run: dotnet restore backend/Grimoire.slnx

      - name: Build solution
        run: dotnet build backend/Grimoire.slnx --configuration Release --no-restore

      - name: Run linting and formatting checks
        run: dotnet format backend/Grimoire.slnx --verify-no-changes --no-restore --verbosity minimal

      - name: Run architecture tests
        run: dotnet test backend/tests/Grimoire.ArchTests --configuration Release --no-build

      - name: Run domain unit tests
        run: dotnet test backend/tests/Grimoire.Domain.UnitTests --configuration Release --no-build

      - name: Run hermetic integration tests
        run: dotnet test backend/tests/Grimoire.IntegrationTests --configuration Release --no-build

      # 009: replay agent evals — hermetic (recordings from data/evals/recordings/, real
      # agent process, zero provider config/secrets). SC-008: zero skipped eval tests.
      # A stale/missing recording fails here — that failure IS the FR-016 merge gate for
      # instruction-file changes (refresh via the EvalRunner capture command or eval.yml).
      - name: Run replay agent evals (hermetic, zero skips)
        timeout-minutes: 10
        run: |
          set -o pipefail
          dotnet test backend/tests/Grimoire.AgentEvals --configuration Release --no-build | tee agent-evals-output.txt
          if ! grep -Eq "Skipped:\s+0," agent-evals-output.txt; then
            echo "::error::Eval tests were skipped — SC-008 requires zero skipped eval tests in the standard suite."
            exit 1
          fi

  frontend:
    name: Frontend Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Type-check
        working-directory: frontend
        run: npm run check

      - name: Lint and format check
        working-directory: frontend
        run: npm run lint

      - name: Run tests
        working-directory: frontend
        run: npm run test

      - name: Build
        working-directory: frontend
        run: npm run build